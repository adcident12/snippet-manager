# Nginx configuration for Personal Snippet Manager
# Include this inside the `server {}` block or as a separate include

location /snippet-manager {
    alias D:/lab/snippet-manager;
    index index.html index.php;
    try_files $uri $uri/ =404;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block dotfiles (deny access to .htaccess, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # PHP-FPM pass-through for API endpoints
    location ~ ^/snippet-manager/api/.*\.php$ {
        alias D:/lab/snippet-manager/api/;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }

    # Deny access to all other PHP files (config, schema, etc.)
    location ~ ^/snippet-manager/(config|api) {
        location ~ \.php$ { deny all; }
    }
}